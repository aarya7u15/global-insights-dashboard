<!DOCTYPE html>
<html>
<head>
  <title>Global Insights Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🌍 Global Insights Dashboard</h1>

  <div id="loader">Loading...</div>

  <button id="toggleTheme">🌙 Dark Mode</button>
  
  <div id="features">
    <input type="text" id="search" placeholder="Search country">
    <select id="regionFilter">
      <option value="">All Regions</option>
      <option value="Asia">Asia</option>
      <option value="Europe">Europe</option>
      <option value="Africa">Africa</option>
      <option value="Americas">Americas</option>
    </select>
    <select id="sort">
    <option value="">Sort</option>
    <option value="asc">Population ↑</option>
    <option value="desc">Population ↓</option>
  </select>
  </div>

  <div id="countries"></div>

  <script src="script.js"></script>
</body>
</html>
